<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 360 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .tooth-part {
        fill: #ffffff;
        stroke: #4b5563;
        stroke-width: 0.4;
        cursor: pointer;
        transition: fill 0.15s;
      }
      .tooth-part:hover {
        fill: #f3f4f6;
      }
      .tooth-part.status-healthy {
        fill: #ffffff;
      }
      .tooth-part.status-cavity-completed {
        fill: #10b981;
      }
      .tooth-part.status-cavity-planned {
        fill: #ef4444;
      }
      .tooth-part.status-observation {
        fill: #fbbf24;
      }
      .tooth-part.status-crown {
        fill: #3b82f6;
      }
      .tooth-part.status-scaling-completed {
        fill: #10b981;
      }
      .tooth-part.status-cleaning {
        fill: #8b5cf6;
      }
      .tooth-label {
        font-size: 6px;
        font-family: ui-sans-serif, system-ui, sans-serif;
        text-anchor: middle;
        fill: #9ca3af;
        pointer-events: none;
      }
      .quadrant-label {
        font-weight: 600;
        font-size: 8px;
        fill: #6b7280;
      }
      .arch-guide {
        fill: none;
        stroke: #f3f4f6;
        stroke-width: 0.5;
      }
      .kids-title {
        font-size: 10px;
        font-weight: 600;
        fill: #f59e0b;
        text-anchor: middle;
      }
    </style>
  </defs>

  <!-- ガイド線（中央縦・横） -->
  <line x1="180" y1="10" x2="180" y2="210" stroke="#f0f0f0" stroke-width="1" />
  <line x1="10" y1="110" x2="350" y2="110" stroke="#f0f0f0" stroke-width="1" />

  <!-- 上顎・下顎のアーチガイド（楕円・乳歯用に小さめ） -->
  <ellipse cx="180" cy="105" rx="110" ry="70" class="arch-guide" />
  <ellipse cx="180" cy="115" rx="110" ry="70" class="arch-guide" />

  <!-- こどもモード表示 -->
  <text x="180" y="25" class="kids-title">こどもモード（乳歯20本）</text>

  <!-- 象限ラベル -->

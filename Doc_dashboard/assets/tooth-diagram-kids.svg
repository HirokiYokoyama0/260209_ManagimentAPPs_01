  <text x="350" y="45" class="quadrant-label" text-anchor="end">左上 (6x)</text>
  <text x="10" y="210" class="quadrant-label">右下 (8x)</text>
  <text x="350" y="210" class="quadrant-label" text-anchor="end">左下 (7x)</text>

